name: Superagent Sports Arbitrage Pipeline

on:
  schedule:
    # Programación cron optimizada cada 15 minutos en horas pico (08:00 a 22:45 UTC)
    - cron: '*/15 8-22 * * *'
  workflow_dispatch: # Habilita la ejecución manual desde la aplicación o interfaz web móvil de GitHub

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install PyPI Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Quantitative Scraper
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Persist Data and Deploy Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add value_bets.json
          # Previene errores de ejecución si no existen diferencias significativas en los resultados actuales
          if ! git diff --cached --quiet; then
            git commit -m "data(bets): actualizacion automatica de cuotas de valor [skip ci]"
            git push origin main
          else
            echo "Sin cambios detectados en el mercado de cuotas. Omitiendo commit."
          fi
